<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="Privata - Private swaps. Privacy by design.">
  <defs>
    <!-- Logo plate gradient hsl(270 80% 70%) -> hsl(280 75% 28%) -->
    <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(270, 80%, 70%)"/>
      <stop offset="100%" stop-color="hsl(280, 75%, 28%)"/>
    </linearGradient>

    <!-- Soft purple radial glow emanating from logo -->
    <radialGradient id="logoHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="hsl(272, 90%, 65%)" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="hsl(272, 85%, 60%)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="hsl(272, 80%, 55%)" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft purple radial glow emanating from wordmark -->
    <radialGradient id="textHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="hsl(272, 85%, 55%)" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="hsl(272, 80%, 50%)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="hsl(272, 75%, 45%)" stop-opacity="0"/>
    </radialGradient>

    <!-- Sheen gradient: bright band for logo plate -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Sheen for the dark text (purple-tinted highlight) -->
    <linearGradient id="sheenText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="hsl(272, 95%, 70%)" stop-opacity="0"/>
      <stop offset="45%" stop-color="hsl(272, 95%, 70%)" stop-opacity="0"/>
      <stop offset="50%" stop-color="hsl(272, 100%, 78%)" stop-opacity="1"/>
      <stop offset="55%" stop-color="hsl(272, 95%, 70%)" stop-opacity="0"/>
      <stop offset="100%" stop-color="hsl(272, 95%, 70%)" stop-opacity="0"/>
    </linearGradient>

    <!-- Halo blur filter -->
    <filter id="haloBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <!-- Clip path: logo plate area -->
    <clipPath id="logoClip">
      <rect x="180" y="140" width="220" height="220" rx="48" ry="48"/>
    </clipPath>

    <!-- Clip path: wordmark letterforms -->
    <clipPath id="wordmarkClip">
      <text x="456" y="265"
            font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif"
            font-weight="800" font-size="150">Privata</text>
    </clipPath>
  </defs>

  <!-- NO background fill - transparent -->

  <!-- Soft halo behind the logo (small light bleeding onto canvas) -->
  <ellipse cx="290" cy="250" rx="220" ry="200" fill="url(#logoHalo)" filter="url(#haloBlur)">
    <animate attributeName="rx" values="210;235;210" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="190;215;190" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Logo shadow (subtle, for depth without solid bg) -->
  <rect x="188" y="158" width="220" height="220" rx="48" ry="48"
        fill="hsl(272, 60%, 25%)" opacity="0.22" filter="url(#haloBlur)"/>

  <!-- Logo plate group -->
  <g clip-path="url(#logoClip)">
    <rect x="180" y="140" width="220" height="220" fill="url(#logoGrad)"/>

    <!-- White P glyph -->
    <g transform="translate(180,140) scale(2.2)">
      <path fill="white"
            d="M 32 22 L 32 78 L 42 78 L 42 58 L 60 58 Q 78 58 78 40 Q 78 22 60 22 Z
               M 42 32 L 60 32 Q 68 32 68 40 Q 68 48 60 48 L 42 48 Z"
            fill-rule="evenodd"/>
    </g>

    <!-- Sheen sweep across the logo plate -->
    <rect x="-220" y="140" width="220" height="220" fill="url(#sheen)" opacity="0.9">
      <animate attributeName="x"
               values="-220;420"
               keyTimes="0;1"
               dur="3.2s"
               begin="0s"
               repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Wordmark (поднят выше) -->
  <text x="456" y="265"
        font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="150" fill="hsl(272, 65%, 22%)">Privata</text>

  <!-- Accent line (static) -->
  <rect x="456" y="315" width="90" height="5" fill="hsl(272, 85%, 55%)"/>

  <!-- Tagline -->
  <text x="566" y="328"
        font-family="DejaVu Sans, Inter, Helvetica, Arial, sans-serif"
        font-weight="400" font-size="36" fill="hsl(272, 30%, 40%)">Private swaps across 10,000+ assets</text>
</svg>
